server {
    listen 80;

    # Permite subir imágenes de hasta 6 MB (search_service acepta hasta 5 MB)
    client_max_body_size 6M;

    # Archivos estáticos del frontend (SPA)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy hacia el search_service (incluye /static/speakers para imágenes)
    location /api/search/ {
        proxy_pass http://search_service:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy hacia el dashboard_service
    location /api/dashboard/ {
        proxy_pass http://dashboard_service:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
