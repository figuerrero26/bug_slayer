
server {

    listen 80;

    # Gzip — reduce el tamaño de transferencia hasta un 70%
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Assets estáticos con hash en el nombre (Vite los genera así): caché 1 año
    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Imágenes: caché 30 días
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Videos: caché 7 días y soporte Range para streaming
    location ~* \.(mp4|webm|ogg)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public";
        add_header Accept-Ranges bytes;
        access_log off;
    }

    # index.html nunca se cachea (SPA — el browser debe pedir la versión nueva)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Proxies a microservicios ──────────────────────────────────────────────

    location /api/auth/ {
        proxy_pass         http://auth_service:8001/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
    }

    location /api/dashboard/ {
        proxy_pass         http://dashboard_service:8002/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
    }

    location /api/search/ {
        proxy_pass         http://search_service:8003/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
    }

    location /api/notifications/ {
        proxy_pass         http://notifications_service:8004/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout    15s;
    }

}
