# Este docker compose es para poder hacer cambios y que se
# vean reflejados en tiempo real y que no haga falta cerrar
# el docker compose y volver a levantarlo para poder ver los cambios efectuados

# Para poder correrlo en la terminal debes ejecutar el siguiente comando en la Git Bash:

# docker compose -f docker-compose.dev.yml up --build

services:

  auth_service:
    build: ./services/auth_service
    container_name: auth_service
    ports:
      - "8005:8001"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@181.79.5.78:3306/db_auth
      JWT_SECRET: cambia-esta-clave-en-produccion
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      DASHBOARD_SERVICE_URL:     http://dashboard_service:8002
      NOTIFICATIONS_SERVICE_URL: http://notifications_service:8004
    volumes:
      - ./services/auth_service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      dashboard_service:
        condition: service_healthy
    networks:
      - coniiti_network
    restart: unless-stopped

  notifications_service:
    build: ./services/notifications_service
    container_name: notifications_service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@181.79.5.78:3306/db_notifications
    volumes:
      - ./services/notifications_service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8004 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - coniiti_network
    restart: unless-stopped

  search_service:
    build: ./services/search_service
    container_name: search_service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL:              mysql+pymysql://coniiti:coniiti@181.79.5.78:3306/db_search
      NOTIFICATIONS_SERVICE_URL: http://notifications_service:8004
      DASHBOARD_SERVICE_URL:     http://dashboard_service:8002
      QR_SECRET:                 coniiti-2026-ucatolica-ingsistemas-bugslayer
      JWT_SECRET:                cambia-esta-clave-en-produccion
      JWT_ALGORITHM:             HS256
      CERT_SECRET:               coniiti-cert-ucatolica-ingsistemas-2026
      CERT_PUBLIC_URL:           http://localhost:5173
    volumes:
      - ./services/search_service:/app
      - speaker_images:/app/uploads/speakers
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      notifications_service:
        condition: service_healthy
    networks:
      - coniiti_network
    restart: unless-stopped

  dashboard_service:
    build: ./services/dashboard_service
    container_name: dashboard_service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@181.79.5.78:3306/db_dashboard
      SEARCH_SERVICE_URL: http://search_service:8003
    volumes:
      - ./services/dashboard_service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      search_service:
        condition: service_healthy
    networks:
      - coniiti_network
    restart: unless-stopped

  assistant_service:
    build: ./services/assistant_service
    container_name: assistant_service
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL:          mysql+pymysql://coniiti:coniiti@181.79.5.78:3306/db_assistant?charset=utf8mb4
      SEARCH_SERVICE_URL:    http://search_service:8003
      DASHBOARD_SERVICE_URL: http://dashboard_service:8002
      OPENAI_API_KEY:        ${OPENAI_API_KEY:-}
      OPENAI_MODEL:          ${OPENAI_MODEL:-gpt-4o-mini}
      N8N_WEBHOOK_URL:       ""
      N8N_WEBHOOK_SECRET:    ""
      N8N_WEBHOOK_TOKEN:     ""
    volumes:
      - ./services/assistant_service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8006 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - coniiti_network
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      AUTH_SERVICE_URL: http://auth_service:8001
      DASHBOARD_SERVICE_URL: http://dashboard_service:8002
      SEARCH_SERVICE_URL: http://search_service:8003
      NOTIFICATIONS_SERVICE_URL: http://notifications_service:8004
      ASSISTANT_SERVICE_URL: http://assistant_service:8006
    volumes:
      - ./Frontend/src:/app/src
      - ./Frontend/public:/app/public
      - ./Frontend/index.html:/app/index.html
    depends_on:
      auth_service:
        condition: service_healthy
      search_service:
        condition: service_healthy
      dashboard_service:
        condition: service_healthy
      assistant_service:
        condition: service_healthy
    networks:
      - coniiti_network
    restart: unless-stopped

volumes:
  speaker_images:

networks:
  coniiti_network:
    driver: bridge
