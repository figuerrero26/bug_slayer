# Este docker compose es para poder hacer cambios y que se
# vean reflejados en tiempo real y que no haga falta cerrar
# el docker compose y volver a levantarlo para poder ver los cambios efectuados

# Para poder correrlo en la terminal debes ejecutar el siguiente comando en la Git Bash:

# docker compose -f docker-compose.dev.yml up --build

services:

  auth_service:
    build: ./services/auth_service
    container_name: auth_service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@181.79.5.78:3306/db_auth
      JWT_SECRET: cambia-esta-clave-en-produccion
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      DASHBOARD_SERVICE_URL: http://dashboard_service:8002
    volumes:
      - ./services/auth_service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      - dashboard_service
    networks:
      - coniiti_network
    restart: unless-stopped

  notifications_service:
    build: ./services/notifications_service
    container_name: notifications_service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@181.79.5.78:3306/db_notifications
    volumes:
      - ./services/notifications_service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8004 --reload
    networks:
      - coniiti_network
    restart: unless-stopped

  search_service:
    build: ./services/search_service
    container_name: search_service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@181.79.5.78:3306/db_search
      NOTIFICATIONS_SERVICE_URL: http://notifications_service:8004
    volumes:
      - ./services/search_service:/app
      - speaker_images:/app/uploads/speakers
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload
    depends_on:
      - notifications_service
    networks:
      - coniiti_network
    restart: unless-stopped

  dashboard_service:
    build: ./services/dashboard_service
    container_name: dashboard_service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@181.79.5.78:3306/db_dashboard
      SEARCH_SERVICE_URL: http://search_service:8003
    volumes:
      - ./services/dashboard_service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    depends_on:
      - search_service
    networks:
      - coniiti_network
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile.dev
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      SEARCH_SERVICE_URL: http://search_service:8003
    volumes:
      - ./Frontend/src:/app/src
      - ./Frontend/public:/app/public
      - ./Frontend/index.html:/app/index.html
    depends_on:
      - auth_service
      - search_service
      - dashboard_service
    networks:
      - coniiti_network
    restart: unless-stopped

volumes:
  speaker_images:

networks:
  coniiti_network:
    driver: bridge
