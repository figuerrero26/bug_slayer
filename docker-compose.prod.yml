# =============================================================================
# docker-compose.prod.yml — Producción | CONIITI Bug Slayer
#
#
# Resultado Nmap desde exterior:
#   80/tcp  open   http
#   443/tcp open   https
#   8001-8004/tcp  filtered  (no vinculados al host → invisibles)
#
# Comando de despliegue:
#   docker compose -f docker-compose.prod.yml up --build -d
# =============================================================================

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # BASTIÓN — Único punto de entrada al clúster
  # Responsabilidades: servir el SPA compilado + reverse proxy a red_interna
  # ═══════════════════════════════════════════════════════════════════════════
  nginx:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    image: coniiti/nginx-frontend:latest
    container_name: nginx
    ports:
      - "80:80"     # HTTP  — único puerto vinculado al host
      - "443:443"   # HTTPS — reservado para TLS/Certbot
    networks:
      - red_perimetral   # acepta tráfico entrante de internet
      - red_interna      # alcanza los microservicios tras bambalinas
    depends_on:
      - auth_service
      - dashboard_service
      - search_service
      - notifications_service
      - assistant_service
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # MICROSERVICIOS — Aislados en red_interna
  # Regla: ningún puerto vinculado al host. Solo expose: (virtual, interno).
  # Todo el tráfico externo entra por Nginx → red_interna, nunca directo.
  # ═══════════════════════════════════════════════════════════════════════════

  auth_service:
    build:
      context: ./services/auth_service
    image: coniiti/auth-service:latest
    container_name: auth_service
    expose:
      - "8001"          # visible solo dentro de red_interna
    env_file:
      - ./services/auth_service/.env.prod
    depends_on:
      - dashboard_service
    networks:
      - red_interna     # ÚNICA red asignada — sin acceso perimetral
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL             # sin capacidades Linux innecesarias
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  dashboard_service:
    build:
      context: ./services/dashboard_service
    image: coniiti/dashboard-service:latest
    container_name: dashboard_service
    expose:
      - "8002"
    env_file:
      - ./services/dashboard_service/.env.prod
    depends_on:
      - search_service
    networks:
      - red_interna
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  search_service:
    build:
      context: ./services/search_service
    image: coniiti/search-service:latest
    container_name: search_service
    expose:
      - "8003"
    env_file:
      - ./services/search_service/.env.prod
    volumes:
      - speaker_images:/app/uploads/speakers   # único volumen: datos físicos
    depends_on:
      - notifications_service
    networks:
      - red_interna
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  notifications_service:
    build:
      context: ./services/notifications_service
    image: coniiti/notifications-service:latest
    container_name: notifications_service
    expose:
      - "8004"
    env_file:
      - ./services/notifications_service/.env.prod
    networks:
      - red_interna
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  assistant_service:
    build:
      context: ./services/assistant_service
    image: coniiti/assistant-service:latest
    container_name: assistant_service
    expose:
      - "8006"
    env_file:
      - ./services/assistant_service/.env.prod
    environment:
      SEARCH_SERVICE_URL:    http://search_service:8003
      DASHBOARD_SERVICE_URL: http://dashboard_service:8002
      OPENAI_API_KEY:        ${OPENAI_API_KEY:-}
      OPENAI_MODEL:          ${OPENAI_MODEL:-gpt-4o-mini}
    networks:
      - red_interna
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

# ── Persistencia ──────────────────────────────────────────────────────────────
volumes:
  speaker_images:
    driver: local

# ── Segmentación de red ───────────────────────────────────────────────────────
networks:
  red_perimetral:
    driver: bridge
    name: coniiti_perimetral
    # Conecta nginx con internet. Solo nginx pertenece a esta red.

  red_interna:
    driver: bridge
    name: coniiti_interna
    # Conecta nginx con los microservicios. Los microservicios SOLO existen aquí.
    # No se marca internal:true porque los servicios necesitan salida a la BD externa.
