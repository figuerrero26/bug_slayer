
version: "3.9"



services:



  search_service:

    build: ./services/search_service

    container_name: search_service

    ports:

      - "8003:8003"

    environment:

      DATABASE_URL: mysql+pymysql://coniiti:coniiti@181.79.5.78:3306/db_search

      NOTIFICATIONS_SERVICE_URL: http://notifications_service:8004

    volumes:

      - speaker_images:/app/uploads/speakers

    restart: unless-stopped



  frontend:

    build: ./Frontend

    container_name: frontend

    ports:

      - "80:80"

    depends_on:

      - search_service

    restart: unless-stopped



  auth_service:
    build: ./services/auth_service
    container_name: auth_service
    ports:
      - "8001:8001"
    env_file: ./services/auth_service/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3



volumes:

  speaker_images:

