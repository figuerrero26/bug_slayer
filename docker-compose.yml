
services:

  auth_service:
    build: ./services/auth_service
    container_name: auth_service
    ports:
      - "8005:8001"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@host.docker.internal:3306/db_auth
      JWT_SECRET: cambia-esta-clave-en-produccion
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "1440"
      DASHBOARD_SERVICE_URL:     http://dashboard_service:8002
      NOTIFICATIONS_SERVICE_URL: http://notifications_service:8004
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - dashboard_service
    networks:
      - coniiti_network
    restart: unless-stopped

  notifications_service:
    build: ./services/notifications_service
    container_name: notifications_service
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@host.docker.internal:3306/db_notifications
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coniiti_network
    restart: unless-stopped

  search_service:
    build: ./services/search_service
    container_name: search_service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@host.docker.internal:3306/db_search
      NOTIFICATIONS_SERVICE_URL: http://notifications_service:8004
      QR_SECRET: coniiti-2026-ucatolica-ingsistemas-bugslayer
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - speaker_images:/app/uploads/speakers
    depends_on:
      - notifications_service
    networks:
      - coniiti_network
    restart: unless-stopped

  dashboard_service:
    build: ./services/dashboard_service
    container_name: dashboard_service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@host.docker.internal:3306/db_dashboard
      SEARCH_SERVICE_URL: http://search_service:8003
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - search_service
    networks:
      - coniiti_network
    restart: unless-stopped

  frontend:
    build: ./Frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - auth_service
      - search_service
      - dashboard_service
    networks:
      - coniiti_network
    restart: unless-stopped

volumes:
  speaker_images:

networks:
  coniiti_network:
    driver: bridge
