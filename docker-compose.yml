
version: "3.9"

services:

  search_service:
    build: ./services/search_service
    container_name: search_service
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@181.79.5.78:3306/db_search
      NOTIFICATIONS_SERVICE_URL: http://notifications_service:8004
    volumes:
      - speaker_images:/app/uploads/speakers
    networks:
      - coniiti_network
    restart: unless-stopped

  dashboard_service:
    build: ./services/dashboard_service
    container_name: dashboard_service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: mysql+pymysql://coniiti:coniiti@181.79.5.78:3306/db_dashboard
      SEARCH_SERVICE_URL: http://search_service:8003
    depends_on:
      - search_service
    networks:
      - coniiti_network
    restart: unless-stopped

  frontend:
    build: ./Frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - search_service
      - dashboard_service
    networks:
      - coniiti_network
    restart: unless-stopped

volumes:
  speaker_images:

networks:
  coniiti_network:
    driver: bridge
